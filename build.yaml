# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  - board: xiao_ble
    shield: settings_reset
  - board: nice_nano_v2
    shield: settings_reset
  - board: xiao_ble
    shield: totem_left
  - board: xiao_ble
    shield: totem_right
  - board: nice_nano_v2
    shield: totem_dongle
  - board: xiao_ble
    shield: totem_left
    snippet: zmk-usb-logging
    artifact-name: totem_left_with_usb_logging
  - board: xiao_ble
    shield: totem_right
    snippet: zmk-usb-logging
    artifact-name: totem_right_with_usb_logging
  - board: xiao_ble
    shield: totem_left
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
    artifact-name: totem_left_clear_bonds
  - board: xiao_ble
    shield: totem_right
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
    artifact-name: totem_right_clear_bonds
  - board: nice_nano_v2
    shield: totem_dongle
    snippet: zmk-usb-logging
    artifact-name: totem_dongle_with_usb_logging
  - board: nice_nano_v2
    shield: totem_dongle
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
    artifact-name: totem_dongle_clear_bonds
